  :root {
    --bg: #F5F2EB;
    --surface: #FFFFFF;
    --surface2: #EDE9E0;
    --text: #1A1A18;
    --text2: #6B6860;
    --text3: #9E9B94;
    --green: #2D6A4F;
    --green-light: #D8EDDF;
    --green-mid: #52B788;
    --red: #C1121F;
    --red-light: #FFE5E7;
    --amber: #9C6200;
    --amber-light: #FFF0C8;
    --blue: #1B4F72;
    --blue-light: #D6EAF8;
    --border: rgba(26,26,24,0.10);
    --radius: 16px;
    --radius-sm: 10px;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
 
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }
 
  /* AUTH */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 2rem;
  }
  .auth-logo { font-size: 48px; margin-bottom: 0.5rem; }
  .auth-title { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; text-align: center; }
  .auth-sub { font-size: 14px; color: var(--text2); text-align: center; margin-top: -1.5rem; }
  .auth-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 1.5rem;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .field-label { font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  input[type="email"], input[type="password"] {
    width: 100%; padding: 12px 14px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    outline: none; transition: border-color 0.15s;
  }
  input:focus { border-color: var(--green-mid); }
  .btn-primary {
    width: 100%; padding: 14px;
    background: var(--green); color: white;
    border: none; border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: background 0.15s, transform 0.1s;
  }
  .btn-primary:active { transform: scale(0.98); background: #1B4332; }
  .btn-ghost {
    width: 100%; padding: 12px;
    background: transparent; color: var(--text2);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-ghost:hover { background: var(--surface2); }
  .auth-error {
    font-size: 13px; color: var(--red); text-align: center;
    padding: 8px; background: var(--red-light);
    border-radius: var(--radius-sm); display: none;
  }
 
  /* APP SHELL */
  #app-screen { display: none; min-height: 100vh; flex-direction: column; }
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-left { display: flex; flex-direction: column; }
  .topbar-name { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
  .topbar-role { font-size: 12px; color: var(--text3); }
  .lang-pill { display: flex; background: var(--surface2); border-radius: 20px; padding: 3px; gap: 2px; }
  .lang-opt {
    padding: 4px 10px; border-radius: 16px; font-size: 12px;
    cursor: pointer; border: none; background: transparent;
    color: var(--text2); font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .lang-opt.active { background: var(--surface); color: var(--text); font-weight: 500; }
  .logout-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 20px; padding: 4px; }
  .content { padding: 20px; flex: 1; }
 
  /* CARDS */
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.25rem; margin-bottom: 12px; }
  .card-title { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }
 
  /* CLOCK */
  .clock-display { font-family: 'DM Mono', monospace; font-size: 52px; font-weight: 400; letter-spacing: -2px; text-align: center; padding: 1rem 0 0.5rem; color: var(--text); }
  .clock-date { text-align: center; font-size: 13px; color: var(--text3); margin-bottom: 1.25rem; }
  .punch-btn {
    width: 100%; padding: 16px; border-radius: var(--radius-sm); border: none;
    font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; letter-spacing: -0.2px;
  }
  .punch-btn.in { background: var(--green); color: white; }
  .punch-btn.in:active { background: #1B4332; transform: scale(0.98); }
  .punch-btn.out { background: var(--red); color: white; }
  .punch-btn.out:active { background: #8B0000; transform: scale(0.98); }
  .punch-btn.break { background: var(--amber-light); color: var(--amber); border: 1px solid rgba(156,98,0,0.2); }
  .punch-btn.break-end { background: var(--amber); color: white; }
  .punch-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .session-info { text-align: center; font-size: 13px; color: var(--text2); margin: 8px 0 12px; min-height: 18px; }
 
  /* GPS banner */
  .gps-banner {
    background: var(--red-light); border: 1px solid rgba(193,18,31,0.2);
    border-radius: var(--radius-sm); padding: 10px 14px;
    font-size: 13px; color: var(--red); text-align: center;
    margin-bottom: 10px; display: none;
  }
 
  /* METRICS */
  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .metric { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px; }
  .metric-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .metric-val { font-size: 22px; font-weight: 500; font-family: 'DM Mono', monospace; letter-spacing: -0.5px; }
  .metric-val.positive { color: var(--green); }
  .metric-val.negative { color: var(--red); }
  .metric-val.neutral { color: var(--text); }
 
  /* BADGES */
  .badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 20px; }
  .badge-green { background: var(--green-light); color: var(--green); }
  .badge-amber { background: var(--amber-light); color: var(--amber); }
  .badge-red { background: var(--red-light); color: var(--red); }
  .badge-blue { background: var(--blue-light); color: var(--blue); }
 
  /* LOG ROWS */
  .log-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .log-row:last-child { border-bottom: none; }
  .log-time { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text2); }
  .log-type { color: var(--text2); }
 
  /* TASK LIST */
  .task-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .task-item:last-child { border-bottom: none; }
  .task-check {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid var(--border); background: var(--bg);
    cursor: pointer; flex-shrink: 0; display: flex;
    align-items: center; justify-content: center;
    font-size: 13px; transition: all 0.15s;
  }
  .task-check.done { background: var(--green); border-color: var(--green); color: white; }
  .task-check.weekly-done { background: var(--blue); border-color: var(--blue); color: white; }
  .task-body { flex: 1; }
  .task-name { font-size: 14px; font-weight: 500; }
  .task-name.done { text-decoration: line-through; color: var(--text3); }
  .task-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .task-soll { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .task-stamp { font-size: 11px; color: var(--green); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .task-late { font-size: 11px; color: var(--red); font-family: 'DM Mono', monospace; margin-top: 2px; }
 
  /* WEEKLY TASK PILL */
  .btn-add-today {
    font-size: 11px; padding: 3px 8px;
    background: var(--blue-light); color: var(--blue);
    border: none; border-radius: 12px;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    white-space: nowrap; flex-shrink: 0;
  }
 
  /* COMPENSATION */
  select {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    margin-bottom: 10px; outline: none;
  }
  .btn-send {
    width: 100%; padding: 12px;
    background: transparent; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--text); cursor: pointer; transition: background 0.15s;
  }
  .btn-send:hover { background: var(--surface2); }
  .dop-display {
    background: var(--green-light); border-radius: var(--radius-sm);
    padding: 12px; text-align: center; margin-bottom: 10px;
  }
  .dop-amount { font-size: 28px; font-weight: 600; color: var(--green); font-family: 'DM Mono', monospace; }
  .dop-label { font-size: 11px; color: var(--green); opacity: 0.8; margin-top: 2px; }
 
  /* CHEF TEAM */
  .team-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .team-row:last-child { border-bottom: none; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .av-green { background: var(--green-light); color: var(--green); }
  .av-purple { background: #EDE9FE; color: #4C1D95; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: var(--green-mid); }
  .dot-gray { background: var(--text3); }
  .team-info { flex: 1; }
  .team-name { font-size: 14px; font-weight: 500; }
  .team-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .team-right { text-align: right; }
  .team-hours { font-size: 14px; font-weight: 500; font-family: 'DM Mono', monospace; }
 
  /* REQUESTS */
  .request-card {
    border-left: 3px solid var(--amber);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 1rem; margin-bottom: 8px;
  }
  .request-card.approved { border-left-color: var(--green-mid); }
  .request-card.denied { border-left-color: var(--text3); opacity: 0.5; }
  .req-actions { display: flex; gap: 8px; margin-top: 10px; }
  .btn-approve { flex: 1; padding: 8px; background: var(--green); color: white; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-deny { flex: 1; padding: 8px; background: var(--red-light); color: var(--red); border: 1px solid rgba(193,18,31,0.2); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; }
 
  /* TABS */
  .tab-bar { display: flex; background: var(--surface2); border-radius: 12px; padding: 3px; margin-bottom: 16px; gap: 3px; }
  .tab { flex: 1; padding: 8px; border: none; border-radius: 9px; background: transparent; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.15s; text-align: center; }
  .tab.active { background: var(--surface); color: var(--text); font-weight: 500; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
 
  /* CHEF TASK VIEW */
  .chef-task-item {
    display: flex; justify-content: space-between;
    align-items: flex-start; padding: 9px 0;
    border-bottom: 1px solid var(--border); gap: 8px;
  }
  .chef-task-item:last-child { border-bottom: none; }
  .chef-task-left { flex: 1; }
  .chef-task-name { font-size: 13px; font-weight: 500; }
  .chef-task-soll { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .chef-task-right { text-align: right; flex-shrink: 0; }
  .chef-task-ist { font-size: 12px; font-family: 'DM Mono', monospace; }
 
  /* WEEK ROW */
  .week-row { display: flex; justify-content: space-between; font-size: 14px; padding: 8px 0; border-bottom: 1px solid var(--border); align-items: center; }
  .week-row:last-child { border-bottom: none; }
 
  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; transition: transform 0.3s ease; z-index: 100; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
 
  .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; color: var(--text3); font-size: 14px; padding: 2rem 0; }
 
  .section-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin: 16px 0 8px; }
</style>
</head>

function t(key) { return T[currentLang]?.[key] || T['es']?.[key] || key; }
function pad(n) { return String(n).padStart(2,'0'); }
function fmtTime(date) { if (!date) return '—'; const d = new Date(date); return pad(d.getHours()) + ':' + pad(d.getMinutes()); }
function fmtDuration(minutes) {
  const h = Math.floor(Math.abs(minutes) / 60);
  const m = Math.abs(minutes) % 60;
  return (minutes < 0 ? '-' : '') + h + 'h ' + pad(m) + 'm';
}
function fmtDate(d) {
  const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return days[d.getDay()] + ', ' + d.getDate() + ' ' + months[d.getMonth()];
}
function showToast(msg) {

}

// ─── GPS ──────────────────────────────────────────────────────────────────────
function haversineM(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
 
function getPosition() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) { reject(new Error('no_geo')); return; }
    navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 10000, maximumAge: 30000 });
  });
}
 
async function checkGps() {
  try {
    const pos = await getPosition();
    const dist = haversineM(FARM_LAT, FARM_LNG, pos.coords.latitude, pos.coords.longitude);
    return { ok: dist <= FARM_RADIUS_M, dist: Math.round(dist) };
  } catch(e) {
    // If geolocation denied/unavailable, block as safety measure
    return { ok: false, dist: null, error: true };
  }
}

async function refreshPesticeroState() {
  const today = new Date(); today.setHours(0,0,0,0);
  const { data: entries } = await sb.from('time_entries')
    .select('*').eq('user_id', currentUser.id)
    .gte('clock_in', today.toISOString())
    .order('clock_in', { ascending: true });
 
  activeEntry = entries?.find(e => !e.clock_out) || null;
 
  let workedMins = 0, meriendaMins = 0;
  entries?.forEach(e => {
    if (e.clock_out) {
      const m = Math.floor((new Date(e.clock_out) - new Date(e.clock_in)) / 60000);
      if (e.entry_type === 'work') workedMins += m;
      if (e.entry_type === 'merienda') meriendaMins += m;
    }
  });
  if (activeEntry?.entry_type === 'work') {
    workedMins += Math.floor((new Date() - new Date(activeEntry.clock_in)) / 60000);
  }
 
  const normalMins = 9 * 60 + 30;
  const overtimeMins = Math.max(0, workedMins - normalMins);
 
  // Session info
  const sessionEl = document.getElementById('session-info');
  if (activeEntry) {
    sessionEl.textContent = activeEntry.entry_type === 'merienda'
      ? t('break_active') + ' ' + fmtTime(activeEntry.clock_in)
      : t('session_active') + ' ' + fmtTime(activeEntry.clock_in);
  } else {
    sessionEl.textContent = t('session_none');
  }
 
  // Punch buttons
  const now = new Date();
  const hour = now.getHours();
  const showMerienda = hour >= 8 && hour < 10;
  const btns = document.getElementById('punch-buttons');
  if (!activeEntry) {
    btns.innerHTML = `<button class="punch-btn in" onclick="punchInGps('work')">${t('clock_in')}</button>`;
  } else if (activeEntry.entry_type === 'work') {
    let mb = showMerienda ? `<button class="punch-btn break" onclick="punchIn('merienda')" style="margin-top:8px;">${t('merienda_start')}</button>` : '';
    btns.innerHTML = `<button class="punch-btn out" onclick="punchOut()">${t('clock_out')}</button>${mb}`;
  } else if (activeEntry.entry_type === 'merienda') {
    btns.innerHTML = `<button class="punch-btn break-end" onclick="punchOut()">${t('merienda_end')}</button>`;
  }
 
  // Metrics
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">${t('today')}</div><div class="metric-val neutral">${fmtDuration(workedMins)}</div></div>
    <div class="metric"><div class="metric-label">${t('overtime')}</div><div class="metric-val ${overtimeMins > 0 ? 'positive' : 'neutral'}">${overtimeMins > 0 ? '+' : ''}${fmtDuration(overtimeMins)}</div></div>
  `;
 
  // Daily plan
  await renderDailyPlan();
 
  // Weekly tasks
  await renderWeeklyTasks();
 
  // History
  const histEl = document.getElementById('history-card');
  let histHTML = `<div class="card-title">${t('history')}</div>`;
  if (!entries || entries.length === 0) {
    histHTML += `<div class="empty">—</div>`;
  } else {
    entries.forEach(e => {
      const typeIn = e.entry_type === 'merienda' ? t('entry_merienda_in') : t('entry_work_in');
      const typeOut = e.entry_type === 'merienda' ? t('entry_merienda_out') : t('entry_work_out');
      histHTML += `<div class="log-row"><span class="log-type">${typeIn}</span><span class="log-time">${fmtTime(e.clock_in)}</span></div>`;
      if (e.clock_out) histHTML += `<div class="log-row"><span class="log-type">${typeOut}</span><span class="log-time">${fmtTime(e.clock_out)}</span></div>`;
    });
  }
  histEl.innerHTML = histHTML;
 
  await renderCompensation(overtimeMins);
}

async function renderDailyPlan() {
  const key = getPesticeroKey();
  const tasks = DAILY_TASKS[key] || [];
  const today = todayStr();
 
  // Load completions from DB
  const { data: completions } = await sb.from('task_completions')
    .select('*').eq('user_id', currentUser.id).eq('date', today).eq('task_type', 'daily');
 
  const doneMap = {};
  (completions || []).forEach(c => { doneMap[c.task_id] = c.completed_at; });
 
  let html = `<div class="card-title">${t('daily_plan')}</div>`;
  const now = new Date();
 
  tasks.forEach(task => {
    const isDone = !!doneMap[task.id];
    const [sh, sm] = task.time.split(':').map(Number);
    const sollEnd = new Date(); sollEnd.setHours(sh, sm + task.dur, 0, 0);
    const sollStart = new Date(); sollStart.setHours(sh, sm, 0, 0);
 
    let statusHtml = '';
    if (isDone) {
      const doneTime = fmtTime(doneMap[task.id]);
      const doneDate = new Date(doneMap[task.id]);
      const lateMins = Math.round((doneDate - sollEnd) / 60000);
      if (lateMins > 2) {
        statusHtml = `<div class="task-late">+${lateMins}min ${t('late_by')}</div>`;
      } else {
        statusHtml = `<div class="task-stamp">${t('completed_at')} ${doneTime}</div>`;
      }
    } else if (now > sollEnd) {
      statusHtml = `<div class="task-late">⚠ ${t('late_by')}</div>`;
    }
 
    html += `
      <div class="task-item">
        <div class="task-check ${isDone ? 'done' : ''}" onclick="${isDone ? '' : `completeTask('${task.id}','daily')`}">${isDone ? '✓' : ''}</div>
        <div class="task-body">
          <div class="task-name ${isDone ? 'done' : ''}">${task.name}</div>
          <div class="task-soll">${task.time} · ${task.dur}min</div>
          ${statusHtml}
        </div>
      </div>`;
  });
 
  document.getElementById('plan-card').innerHTML = html;
}
 
// ─── WEEKLY TASKS ─────────────────────────────────────────────────────────────
async function renderWeeklyTasks() {
  const today = todayStr();
  const weekStart = getWeekStart();
 
  // What's already on today's plan (weekly tasks)
  const { data: todayWeekly } = await sb.from('task_completions')
    .select('*').eq('user_id', currentUser.id).eq('date', today).eq('task_type', 'weekly');
  const todayIds = new Set((todayWeekly || []).map(c => c.task_id));
  const doneMap = {};
  (todayWeekly || []).forEach(c => { if (c.completed_at) doneMap[c.task_id] = c.completed_at; });
 
  // How many times done this week per task
  const { data: weekCompletions } = await sb.from('task_completions')
    .select('*').eq('user_id', currentUser.id).gte('date', weekStart).eq('task_type', 'weekly');
  const weekCountMap = {};
  (weekCompletions || []).forEach(c => {
    if (c.completed_at) weekCountMap[c.task_id] = (weekCountMap[c.task_id] || 0) + 1;
  });
 
  let html = `<div class="card-title">${t('weekly_tasks')}</div>`;
 
  WEEKLY_TASKS.forEach(task => {
    const onToday = todayIds.has(task.id);
    const isDone = !!doneMap[task.id];
    const doneCount = weekCountMap[task.id] || 0;
    const remaining = task.freq - doneCount;
    const allDone = remaining <= 0;
 
    if (allDone && !onToday) return; // hide if fully done this week and not on today
 
    let rightBtn = '';
    if (!onToday && !allDone) {
      rightBtn = `<button class="btn-add-today" onclick="addWeeklyToday('${task.id}')">${t('add_today')}</button>`;
    } else if (onToday) {
      rightBtn = `<div class="task-check ${isDone ? 'weekly-done' : ''}" onclick="${isDone ? '' : `completeTask('${task.id}','weekly')`}">${isDone ? '✓' : ''}</div>`;
    }
 
    const freqLabel = task.freq > 1 ? `${doneCount}/${task.freq}×/sem` : `${allDone ? '✓' : (onToday ? 'Hoy' : 'Esta sem.')}`;
 
    html += `
      <div class="task-item">
        ${onToday ? '' : `<div style="width:22px;flex-shrink:0;"></div>`}
        <div class="task-body">
          <div class="task-name ${isDone ? 'done' : ''}">${task.name}</div>
          <div class="task-meta">${task.dur >= 60 ? Math.floor(task.dur/60)+'h'+(task.dur%60?pad(task.dur%60)+'m':'') : task.dur+'min'} · ${freqLabel}</div>
        </div>
        ${rightBtn}
      </div>`;
  });
 
  document.getElementById('weekly-card').innerHTML = html;
}
 
function getWeekStart() {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff); d.setHours(0,0,0,0);
  return d.toISOString().slice(0,10);
}
 
async function addWeeklyToday(taskId) {
  const today = todayStr();
  await sb.from('task_completions').upsert({

  }, { onConflict: 'user_id,task_id,date' });

async function completeTask(taskId, taskType) {
  const today = todayStr();
  const now = new Date().toISOString();
  await sb.from('task_completions').upsert({
    user_id: currentUser.id, task_id: taskId,
    date: today, task_type: taskType, completed_at: now
  }, { onConflict: 'user_id,task_id,date' });
  showToast(t('task_done'));
  if (taskType === 'daily') await renderDailyPlan();
  else await renderWeeklyTasks();
}

async function punchInGps(type) {
  const banner = document.getElementById('gps-banner');
  banner.style.display = 'block';
  banner.textContent = t('gps_checking');
 
  const result = await checkGps();
  if (!result.ok) {
    const dist = result.dist != null ? ` (${result.dist}m)` : '';
    banner.textContent = t('gps_blocked') + dist;
    return;
  }
  banner.style.display = 'none';
  await punchIn(type);
}
 
async function punchIn(type) {
  const { error } = await sb.from('time_entries').insert({
    user_id: currentUser.id,
    clock_in: new Date().toISOString(),
    entry_type: type
  });
  if (!error) {
    showToast(type === 'merienda' ? t('break_started') : t('punched_in'));
    await refreshPesticeroState();
  }
}
 
async function punchOut() {
  if (!activeEntry) return;
  const { error } = await sb.from('time_entries').update({ clock_out: new Date().toISOString() }).eq('id', activeEntry.id);
  if (!error) {
    showToast(activeEntry.entry_type === 'merienda' ? t('break_ended') : t('punched_out'));
    activeEntry = null;
    await refreshPesticeroState();
  }
}

async function renderCompensation(todayOvertimeMins) {
  const { data: allEntries } = await sb.from('time_entries').select('*').eq('user_id', currentUser.id);
  let totalWorked = 0;
  allEntries?.forEach(e => {
    if (e.clock_out && e.entry_type === 'work')
      totalWorked += Math.floor((new Date(e.clock_out) - new Date(e.clock_in)) / 60000);
  });
 
  const { data: approved } = await sb.from('compensation_requests').select('*').eq('user_id', currentUser.id).eq('status', 'approved');
  let deducted = 0;
  approved?.forEach(r => deducted += r.hours_requested * 60);
 
  const days = allEntries ? [...new Set(allEntries.filter(e => e.entry_type === 'work' && e.clock_out).map(e => e.clock_in.slice(0,10)))].length : 0;
  const bankMins = totalWorked - (days * (9*60+30)) - deducted;
 
  const compEl = document.getElementById('comp-card');
  if (bankMins <= 0) {
    compEl.innerHTML = `<div class="card-title">${t('compensation')}</div><div class="empty">${t('no_bank')}</div>`;

  const rate = HOURLY_RATES[currentProfile?.name] || 90;

    const pKey = p.name.includes('Nelson') ? 'nelson' : 'arturo';
    const tasks = DAILY_TASKS[pKey] || [];
 
    const { data: completions } = await sb.from('task_completions')
      .select('*').eq('user_id', p.id).eq('date', today).eq('task_type', 'daily');
    const doneMap = {};
    (completions || []).forEach(c => { doneMap[c.task_id] = c.completed_at; });
 
    const now = new Date();
    const firstName = p.name.split(' ')[0] + ' ' + p.name.split(' ')[1];
    const doneCount = Object.values(doneMap).filter(v => v).length;
 
    html += `<div class="card">
      <div class="card-title">${firstName} · ${doneCount}/${tasks.length} ${t('completed_at')}</div>`;
 
    tasks.forEach(task => {
      const isDone = !!doneMap[task.id];
      const [sh, sm] = task.time.split(':').map(Number);
      const sollEnd = new Date(); sollEnd.setHours(sh, sm + task.dur, 0, 0);
      const isLate = !isDone && now > sollEnd;
 
      let istHtml = '';
      if (isDone) {
        const doneDate = new Date(doneMap[task.id]);
        const lateMins = Math.round((doneDate - sollEnd) / 60000);
        istHtml = lateMins > 2
          ? `<div class="chef-task-ist" style="color:var(--red);">${fmtTime(doneMap[task.id])} <span style="font-size:10px;">+${lateMins}m</span></div>`
          : `<div class="chef-task-ist" style="color:var(--green);">${fmtTime(doneMap[task.id])} ✓</div>`;
      } else if (isLate) {
        istHtml = `<span class="badge badge-red">⚠ Pendiente</span>`;
      } else {
        istHtml = `<span style="font-size:11px;color:var(--text3);">—</span>`;
      }
 
      html += `<div class="chef-task-item">
        <div class="chef-task-left">
          <div class="chef-task-name" style="${isDone ? 'color:var(--text3);text-decoration:line-through;' : isLate ? 'color:var(--red);' : ''}">${task.name}</div>
          <div class="chef-task-soll">${task.time} · ${task.dur}min</div>
        </div>
        <div class="chef-task-right">${istHtml}</div>
      </div>`;
    });
    html += '</div>';
  }
 
  document.getElementById('chef-plan').innerHTML = html || '<div class="card"><div class="empty">—</div></div>';
}
 
async function loadChefRequests() {
  const { data: requests } = await sb.from('compensation_requests').select('*, profiles(name)').eq('status', 'pending').order('created_at', { ascending: false });
  let html = `<div class="card-title">${t('pending_requests')}</div>`;
  if (!requests || requests.length === 0) {
    html += `<div class="empty">${t('no_pending')}</div>`;
    document.getElementById('chef-requests').innerHTML = `<div class="card">${html}</div>`;
    return;
  }
  requests.forEach(r => {
    const rate = HOURLY_RATES[r.profiles?.name] || 90;
    const dop = Math.round(r.hours_requested * rate);
    const typeLabel = r.type === 'money' ? `💵 Dinero · RD$ ${dop.toLocaleString()}` : '⏱ Tiempo libre';
    html += `<div class="request-card" id="req-${r.id}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <strong style="font-size:14px;">${r.profiles?.name}</strong>
        <span class="badge badge-amber">Pendiente</span>
      </div>
      <div style="font-size:13px;color:var(--text2);">${typeLabel} · ${fmtDuration(r.hours_requested * 60)}</div>
      <div class="req-actions">
        <button class="btn-approve" onclick="handleRequest('${r.id}','approved')">${t('approve')}</button>
        <button class="btn-deny" onclick="handleRequest('${r.id}','denied')">${t('deny')}</button>
      </div>
    </div>`;
  });
  document.getElementById('chef-requests').innerHTML = html;
}
 
async function handleRequest(id, status) {
  await sb.from('compensation_requests').update({ status }).eq('id', id);
  const card = document.getElementById('req-' + id);
  if (card) {
    card.className = 'request-card ' + (status === 'approved' ? 'approved' : 'denied');
    card.querySelector('.req-actions').innerHTML = `<span style="font-size:13px;font-weight:500;color:${status === 'approved' ? 'var(--green)' : 'var(--text3)'};">${status === 'approved' ? t('approved') : t('denied')}</span>`;
    card.querySelector('.badge').textContent = status === 'approved' ? t('approved') : t('denied');
    card.querySelector('.badge').className = 'badge ' + (status === 'approved' ? 'badge-green' : '');
  }
  showToast(status === 'approved' ? t('approved') : t('denied'));
}
 
async function loadChefWeek() {
  const { data: pesticeros } = await sb.from('profiles').select('*').eq('role', 'pesticero');
  const weekStart = getWeekStart();
  let html = `<div class="card"><div class="card-title">${t('week_summary')}</div>`;
  for (const p of (pesticeros || [])) {
    const { data: entries } = await sb.from('time_entries').select('*').eq('user_id', p.id).gte('clock_in', weekStart);
    let workedMins = 0;
    entries?.forEach(e => {
      if (e.clock_out && e.entry_type === 'work')
        workedMins += Math.floor((new Date(e.clock_out) - new Date(e.clock_in)) / 60000);
    });
    const days = entries ? [...new Set(entries.filter(e => e.entry_type==='work'&&e.clock_out).map(e => e.clock_in.slice(0,10)))].length : 0;
    const overtime = workedMins - days * (9*60+30);
    const rate = HOURLY_RATES[p.name] || 90;
    const dopOT = overtime > 0 ? Math.round((overtime/60)*rate) : 0;
    html += `<div class="week-row">
      <span style="font-size:14px;font-weight:500;">${p.name.split(' ').slice(0,2).join(' ')}</span>
      <div style="display:flex;align-items:center;gap:8px;flex-direction:column;align-items:flex-end;">
        <span style="font-family:'DM Mono',monospace;font-size:14px;">${fmtDuration(workedMins)}</span>
        ${overtime > 0 ? `<span class="badge badge-amber">+${fmtDuration(overtime)} · RD$ ${dopOT.toLocaleString()}</span>` : overtime < 0 ? `<span class="badge badge-red">${fmtDuration(overtime)}</span>` : `<span class="badge badge-green">${t('normal_hours')}</span>`}
      </div>
    </div>`;
  }
  html += '</div>';
  document.getElementById('chef-week').innerHTML = html;
}
 
// ─── LANG ─────────────────────────────────────────────────────────────────────
async function setLang(lang) {
  currentLang = lang;
  document.getElementById('lang-es').classList.toggle('active', lang === 'es');
  document.getElementById('lang-ht').classList.toggle('active', lang === 'ht');
  await sb.from('profiles').update({ language: lang }).eq('id', currentUser.id);
  document.getElementById('top-role').textContent = t('role_' + currentProfile.role);
  if (currentProfile.role === 'pesticero') await refreshPesticeroState();
}

sb.auth.getSession().then(({ data: { session } }) => {
  if (session?.user) initApp(session.user);
});
